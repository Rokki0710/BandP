<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B&P prod - Каталог</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/index.html">
                <i class="bi bi-camera-reels-fill me-2"></i>B&P prod
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="auth-links"></ul>
            </div>
        </div>
    </nav>

    <div class="catalog-header">
        <div class="container">
            <h1 class="catalog-title">Каталог</h1>
            <p class="text-muted mt-2">Выберите студию, оборудование или специалиста</p>
        </div>
    </div>

    <div class="container">
        <div id="message-container"></div>

        <!-- Табы -->
        <ul class="nav nav-tabs mb-4" id="catalogTab" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="studios-tab" data-bs-toggle="tab" data-bs-target="#studios" type="button" role="tab">
                    <i class="bi bi-building"></i> Студии
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="equipment-tab" data-bs-toggle="tab" data-bs-target="#equipment" type="button" role="tab">
                    <i class="bi bi-camera"></i> Оборудование
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="specialists-tab" data-bs-toggle="tab" data-bs-target="#specialists" type="button" role="tab">
                    <i class="bi bi-people"></i> Специалисты
                </button>
            </li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="studios">
                <div id="catalog-container">
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-3">Загрузка студий...</p>
                    </div>
                </div>
            </div>
            <div class="tab-pane fade" id="equipment">
                <div id="equipment-container">
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-3">Загрузка оборудования...</p>
                    </div>
                </div>
            </div>
            <div class="tab-pane fade" id="specialists">
                <div id="specialists-container">
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-3">Загрузка специалистов...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-5">
        <div class="container text-center">
            <p>&copy; 2026 B&P prod. Все права защищены.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/main.js"></script>
</body>
</html>
