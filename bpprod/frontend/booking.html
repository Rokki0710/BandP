<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B&P prod - Бронирование</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/index.html">
                <i class="bi bi-camera-reels-fill me-2"></i>B&P prod
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto" id="auth-links"></ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2 class="text-center mb-4">
                <i class="bi bi-calendar-plus"></i> Новое бронирование
            </h2>

            <div id="message-container"></div>

            <form id="booking-form">
                <div class="mb-3">
                    <label class="form-label">Тип услуги *</label>
                    <select class="form-control" id="booking-type" required>
                        <option value="">Выберите тип</option>
                        <option value="studio">Студия</option>
                        <option value="equipment">Оборудование</option>
                        <option value="specialist">Специалист</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Выберите объект *</label>
                    <select class="form-control" id="booking-item" required disabled>
                        <option value="">Сначала выберите тип</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Дата *</label>
                    <input type="date" class="form-control" id="booking-date" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Время начала *</label>
                        <input type="time" class="form-control" id="start-time" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Время окончания *</label>
                        <input type="time" class="form-control" id="end-time" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Стоимость</label>
                    <input type="text" class="form-control" id="total-price" readonly disabled>
                </div>

                <button type="submit" class="btn btn-orange w-100">
                    <i class="bi bi-check-circle"></i> Забронировать
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/main.js"></script>
</body>
</html>
