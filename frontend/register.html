<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B&P prod - Регистрация</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Наши стили -->
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/index.html">
                <i class="bi bi-camera-reels-fill me-2"></i>B&P prod
            </a>
        </div>
    </nav>

    <!-- Форма регистрации -->
    <div class="container">
        <div class="form-container">
            <h2 class="text-center mb-4">Регистрация</h2>
            
            <!-- Контейнер для сообщений -->
            <div id="message-container"></div>

            <form id="register-form">
                <div class="mb-3">
                    <label for="username" class="form-label">Имя пользователя *</label>
                    <input type="text" class="form-control" id="username" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email *</label>
                    <input type="email" class="form-control" id="email" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="first-name" class="form-label">Имя</label>
                        <input type="text" class="form-control" id="first-name">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="last-name" class="form-label">Фамилия</label>
                        <input type="text" class="form-control" id="last-name">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="phone" class="form-label">Телефон</label>
                    <input type="tel" class="form-control" id="phone" placeholder="+7 (999) 999-99-99">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Пароль *</label>
                    <input type="password" class="form-control" id="password" required>
                    <small class="text-muted">Минимум 6 символов</small>
                </div>

                <div class="mb-3">
                    <label for="confirm-password" class="form-label">Подтверждение пароля *</label>
                    <input type="password" class="form-control" id="confirm-password" required>
                </div>

                <button type="submit" class="btn btn-orange w-100">
                    <i class="bi bi-person-plus me-2"></i>Зарегистрироваться
                </button>
                
                <p class="text-center mt-3">
                    Уже есть аккаунт? <a href="/login.html">Войти</a>
                </p>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Наш JS -->
    <script type="module" src="/main.js"></script>
</body>
</html>
